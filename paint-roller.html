<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller Royale</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #1a1a1a; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        .screen { display: none; width: 100%; max-width: 520px; padding: 10px; }
        .screen.active { display: block; }
        .card {
            background: #2a2a2a; border: 1px solid #444;
            border-radius: 12px; padding: 30px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,.5);
        }
        h1 { margin: 0 0 6px; color: #ffca28; font-size: 2.2rem; }
        h2 { margin: 0 0 20px; color: #ccc; font-size: 1rem; font-weight: 400; }
        input[type="text"] {
            background: #333; border: 1px solid #555; border-radius: 6px;
            color: #fff; font-size: 1rem; padding: 10px 14px;
            width: 100%; margin-bottom: 10px; outline: none;
        }
        input[type="text"]:focus { border-color: #ffca28; }
        .btn {
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 1rem; font-weight: 700; padding: 10px 22px;
            transition: filter .15s, transform .1s; margin: 5px 4px;
        }
        .btn:hover  { filter: brightness(1.12); }
        .btn:active { transform: scale(.97); }
        .btn-green  { background: #4caf50; color: #fff; }
        .btn-blue   { background: #33b5e5; color: #fff; }
        .btn-red    { background: #e53935; color: #fff; }
        .btn-grey   { background: #555;    color: #fff; }
        .btn-sm     { padding: 5px 12px; font-size: .82rem; }
        .btn-loading { opacity: .6; pointer-events: none; }
        #lobby-title { font-size: 1.4rem; margin-bottom: 4px; color: #ffca28; }
        #lobby-code-display {
            background: #333; border-radius: 8px; padding: 8px 18px;
            display: inline-block; font-size: 1.8rem; font-weight: 900;
            letter-spacing: 6px; color: #ffca28; margin-bottom: 16px;
        }
        #player-list { list-style: none; margin: 0; padding: 0; text-align: left; }
        #player-list li {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; margin-bottom: 6px;
            background: rgba(255,255,255,.05); border-radius: 6px;
            font-size: .95rem; flex-wrap: wrap;
        }
        .player-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .player-name-label { flex: 1; font-weight: 600; }

        .status-unready { background: #e53935; color: #fff; }
        .status-playing { background: #ffca28; color: #222; }
        #game-wrap { display: none; flex-direction: column; align-items: center; }
        #game-top-bar {

        }

            padding: 6px 14px; border-radius: 20px; font-size: .9rem; font-weight: 700;

        #timer-display {
            font-size: 2rem; font-weight: 900;
            background: #333; border: 2px solid #555;
            border-radius: 10px; padding: 4px 20px;
            min-width: 80px; text-align: center;

        #gameCanvas { background: #fff; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
        #countdown-overlay {

            align-items: center; justify-content: center;

        #countdown-overlay.visible { display: flex; }
        #countdown-num {
            font-size: 12rem; font-weight: 900; color: #ffca28;
            text-shadow: 0 0 60px rgba(255,202,40,.6);
            animation: pulse .8s ease-in-out;

            0%   { transform: scale(1.4); opacity: 0; }
            50%  { transform: scale(1);   opacity: 1; }
            100% { transform: scale(.85); opacity: .8; }

        #results-screen {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.85); z-index: 60;
            align-items: center; justify-content: center;
        }
        #results-screen.visible { display: flex; }
        #results-card {
            background: #2a2a2a; border: 1px solid #444;
            border-radius: 14px; padding: 36px 44px;
            text-align: center; min-width: 320px;
        }
        #results-title  { font-size: 2rem; font-weight: 900; margin-bottom: 20px; }
        .result-row     { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 1.1rem; }
        .result-rank    { font-size: 1.4rem; width: 36px; }
        .result-dot     { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .result-name    { flex: 1; text-align: left; font-weight: 700; }

        #results-countdown { margin-top: 18px; color: #aaa; font-size: .9rem; }
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333; border: 1px solid #555; border-radius: 8px;
            padding: 10px 22px; font-size: .95rem; z-index: 999;
            transition: transform .3s ease; pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        .divider    { border: none; border-top: 1px solid #444; margin: 18px 0; }
        .error-text { color: #e53935; font-size: .85rem; margin: 6px 0; min-height: 18px; }
        .info-text  { color: #aaa; font-size: .82rem; }
    </style>
</head>
<body>

<!-- MAIN MENU -->
<div id="screen-menu" class="screen active">
    <div class="card">
        <h1>🎨 Roller Royale</h1>
        <h2>Paint the canvas – highest coverage wins!</h2>

            <input type="text" id="input-code" placeholder="Enter lobby code (A–Z)…"
                   maxlength="1"
                   style="text-transform:uppercase;text-align:center;font-size:1.5rem;letter-spacing:4px;">
            <br>
            <button class="btn btn-blue" id="btn-join" onclick="handleJoin()">Enter Lobby</button>

</div>

<!-- LOBBY -->
<div id="screen-lobby" class="screen">

        <hr class="divider">

        <hr class="divider">

        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-green" id="btn-ready" onclick="toggleReady()">✅ Ready</button>

</div>

<!-- GAME -->
<div id="game-wrap">
    <div id="game-top-bar">
        <div id="scores-bar"></div>
        <div id="timer-display">80s</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<!-- COUNTDOWN -->
<div id="countdown-overlay"><div id="countdown-num">3</div></div>

<!-- RESULTS -->
<div id="results-screen">
    <div id="results-card">
        <div id="results-title">🏆 Results</div>
        <div id="results-list"></div>
        <div id="results-countdown">Returning to lobby in 7s…</div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
    getDatabase, ref, set, get, update, push, remove,
    onValue, off, onDisconnect
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

/* ══════════════════════════════════════════
   FIREBASE CONFIG
══════════════════════════════════════════ */
const firebaseConfig = {
    apiKey:            "AIzaSyAwEy-sJx7E61BA6VmBfIFMZsjuAj8RK5g",
    authDomain:        "games-c3e27.firebaseapp.com",
    databaseURL:       "https://games-c3e27-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "games-c3e27",
    storageBucket:     "games-c3e27.firebasestorage.app",
    messagingSenderId: "193027632069",
    appId:             "1:193027632069:web:b559c3b10011bc6982b9ac"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const PLAYER_COLORS   = ['#ff4444','#33b5e5','#00c851','#ffbb33','#aa66cc','#ff8800','#00b8d4','#f06292'];
const GAME_DURATION   = 80_000;   // ms
const RESULT_DURATION = 7_000;    // ms
const GRID_SIZE       = 10;
const COLS            = 80;       // 800 / 10
const ROWS            = 60;       // 600 / 10
const TOTAL_CELLS     = COLS * ROWS;
const ROLLER_R        = 22;
const PLAYER_R        = 12;
const SPEED           = 4;
const SPAWN = [
    [50,50],[750,550],[750,50],[50,550],
    [400,50],[400,550],[50,300],[750,300]
];

/* ══════════════════════════════════════════
   SESSION STATE
══════════════════════════════════════════ */
let myId          = null;   // Firebase push-key for my player node
let myName        = '';
let lobbyLetter   = '';
let isHost        = false;  // true = this client writes gameEndAt + paint chunks
let isReady       = false;
let inAction      = false;  // blocks double-clicks on create/join

/* ══════════════════════════════════════════
   LIVE FIREBASE SNAPSHOTS
══════════════════════════════════════════ */
let lobbyMeta    = {};   // latest value of the lobby root
let lobbyPlayers = {};   // latest value of lobby/players

/* ══════════════════════════════════════════
   GAME STATE
   MENU | LOBBY | COUNTDOWN | PLAYING | RESULTS
══════════════════════════════════════════ */
let gameState = 'MENU';

/* ══════════════════════════════════════════
   FIREBASE LISTENER REGISTRY
══════════════════════════════════════════ */
let fbListeners = [];   // [{r, fn}]
function addFbListener(r, fn) { onValue(r, fn); fbListeners.push({ r, fn }); }
function clearFbListeners()   { fbListeners.forEach(({ r, fn }) => off(r, fn)); fbListeners = []; }

/* ══════════════════════════════════════════
   IN-GAME STATE
══════════════════════════════════════════ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let keys     = {};

// Flat Uint8Array: grid[col * ROWS + row] = slot (0 = empty)
let grid = new Uint8Array(COLS * ROWS);

// Active players in current match
// {id, name, color, slot, x, y, prevX, prevY, isMe}
let activePlayers = [];

// Paint sync
let paintSeq      = 0;     // host increments every flush
let lastAppliedSeq = -1;   // clients skip chunks already applied
let paintTimer    = null;  // host's setInterval for flushing paint

// Timing
let gameEndAt   = null;
let timerTick   = null;
let resultTimer = null;
let rafId       = null;

// Prevents maybeCheckAllReady from starting the match twice
let startGuard = false;

/* ══════════════════════════════════════════
   PATH HELPERS
══════════════════════════════════════════ */
function lPath(sub) { return sub ? `Paint-roller/lobby ${lobbyLetter}/${sub}` : `Paint-roller/lobby ${lobbyLetter}`; }
function lRef(sub)  { return ref(db, lPath(sub)); }

/* ══════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════ */
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (id) { const el = document.getElementById(id); if (el) el.classList.add('active'); }
}

function toast(msg, dur = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
}

function setBusy(busy) {
    ['btn-create', 'btn-showjoin', 'btn-join'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('btn-loading', busy);
    });
    inAction = busy;
}

/* ══════════════════════════════════════════
   PAINT MATH  (pure functions — identical on every client)
══════════════════════════════════════════ */
function cellCircle(cx, cy) {
    const out   = [];
    const baseC = Math.floor(cx / GRID_SIZE);
    const baseR = Math.floor(cy / GRID_SIZE);
    const range = Math.ceil(ROLLER_R / GRID_SIZE);
    for (let c = Math.max(0, baseC - range); c <= Math.min(COLS - 1, baseC + range); c++) {
        for (let r = Math.max(0, baseR - range); r <= Math.min(ROWS - 1, baseR + range); r++) {
            const dx = (c * GRID_SIZE + GRID_SIZE * 0.5) - cx;
            const dy = (r * GRID_SIZE + GRID_SIZE * 0.5) - cy;
            if (dx * dx + dy * dy <= ROLLER_R * ROLLER_R) {
                out.push(c * ROWS + r);
            }
        }
    }
    return out;
}

function cellLine(x0, y0, x1, y1) {
    const seen  = new Set();
    const dist  = Math.hypot(x1 - x0, y1 - y0);
    const steps = Math.max(1, Math.ceil(dist / (GRID_SIZE * 0.5)));
    for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const cx = x0 + (x1 - x0) * t;
        const cy = y0 + (y1 - y0) * t;
        cellCircle(cx, cy).forEach(ci => seen.add(ci));
    }
    return [...seen];
}

function applyChunk(body) {
    if (!body) return;
    const parts = body.split(';');
    for (let i = 0; i < parts.length; i++) {
        const part  = parts[i];
        if (!part) continue;
        const colon = part.indexOf(':');
        if (colon < 0) continue;
        const slot    = parseInt(part.slice(0, colon), 10);
        const indices = part.slice(colon + 1).split(',');
        for (let j = 0; j < indices.length; j++) {
            const ci = parseInt(indices[j], 10);
            if (ci >= 0 && ci < grid.length) grid[ci] = slot;
        }
    }
}

/* ══════════════════════════════════════════
   GLOBAL EMPTY-LOBBY SWEEP
   Scan ALL lobbies under Paint-roller/ and delete any
   that have no players node or an empty players node.
   Called on every leave / tab-close event.
══════════════════════════════════════════ */
async function sweepEmptyLobbies() {
    try {
        const snap = await get(ref(db, 'Paint-roller'));
        if (!snap.exists()) return;
        const lobbies = snap.val();
        const deletes = [];
        Object.entries(lobbies).forEach(([key, lobby]) => {
            const hasPlayers = lobby.players && Object.keys(lobby.players).length > 0;
            if (!hasPlayers) {
                deletes.push(remove(ref(db, `Paint-roller/${key}`)));
            }
        });
        if (deletes.length) await Promise.all(deletes);
    } catch (_) { /* best effort */ }
}

/* ══════════════════════════════════════════
   DISCONNECT HANDLER MANAGEMENT
   Each client registers onDisconnect for its own player node.
   The host ALSO registers onDisconnect for the lobby root.
   All handlers are cancelled before any explicit remove() call.
══════════════════════════════════════════ */
function registerDisconnectHandlers() {
    if (!myId || !lobbyLetter) return;
    onDisconnect(lRef(`players/${myId}`)).remove();
    if (isHost) onDisconnect(lRef()).remove();
}

async function cancelDisconnectHandlers() {
    try { await onDisconnect(lRef(`players/${myId}`)).cancel(); } catch (_) {}
    try { await onDisconnect(lRef()).cancel(); }                  catch (_) {}
}

/* ══════════════════════════════════════════
   MENU — CREATE / JOIN
══════════════════════════════════════════ */
window.showJoin = () => {
    document.getElementById('join-section').style.display = 'block';
    document.getElementById('input-code').focus();
};
window.hideJoin = () => {
    document.getElementById('join-section').style.display = 'none';
};

window.handleCreate = async () => {
    if (inAction) return;
    const name = document.getElementById('input-name').value.trim();
    if (!name) { document.getElementById('menu-error').textContent = 'Enter your name.'; return; }
    document.getElementById('menu-error').textContent = '';
    setBusy(true);

    try {
        // Sweep stale empty lobbies before reading free letters
        await sweepEmptyLobbies();

        const rootSnap = await get(ref(db, 'Paint-roller'));
        const taken    = rootSnap.exists()
            ? Object.keys(rootSnap.val()).map(k => k.replace('lobby ', ''))
            : [];
        const freeAll = 'abcdefghijklmnopqrstuvwxyz'.split('').filter(l => !taken.includes(l));
        if (!freeAll.length) {
            document.getElementById('menu-error').textContent = 'All 26 lobbies are full. Try again shortly.';
            setBusy(false);
            return;
        }
        const letter = freeAll[Math.floor(Math.random() * freeAll.length)];

        lobbyLetter = letter;
        myName      = name;
        isHost      = true;

        const pRef = push(lRef('players'));
        myId = pRef.key;

        await set(lRef(), {
            status: 'lobby', gameEndAt: null, creatorId: myId,
            results: null, paintChunk: '', paintSeq: 0
        });
        await set(pRef, { name: myName, color: PLAYER_COLORS[0], slot: 1, ready: false });

        registerDisconnectHandlers();
        setBusy(false);
        enterLobby();
    } catch (err) {
        console.error('handleCreate error:', err);
        document.getElementById('menu-error').textContent = 'Failed to create lobby. Check your connection.';
        setBusy(false);
    }
};

window.handleJoin = async () => {
    if (inAction) return;
    const name = document.getElementById('input-name').value.trim();
    if (!name) { document.getElementById('menu-error').textContent = 'Enter your name.'; return; }
    document.getElementById('menu-error').textContent = '';

    const raw = document.getElementById('input-code').value.trim().toLowerCase();
    if (!/^[a-z]$/.test(raw)) {
        document.getElementById('menu-error').textContent = 'Enter a single letter A–Z.';
        return;
    }
    setBusy(true);

    try {
        const lobbySnap = await get(ref(db, `Paint-roller/lobby ${raw}`));
        if (!lobbySnap.exists()) {
            document.getElementById('menu-error').textContent = 'Lobby not found. Check the code.';
            setBusy(false);
            return;
        }

        lobbyLetter = raw;
        myName      = name;
        isHost      = false;

        // Find the next free slot
        const psSnap    = await get(lRef('players'));
        const existing  = psSnap.exists() ? Object.values(psSnap.val()) : [];
        const usedSlots = new Set(existing.map(p => p.slot));
        let slot = 1;
        while (usedSlots.has(slot)) slot++;
        const color = PLAYER_COLORS[(slot - 1) % PLAYER_COLORS.length];

        const pRef = push(lRef('players'));
        myId = pRef.key;
        await set(pRef, { name: myName, color, slot, ready: false });

        // My player node removed on disconnect; lobby root is not my responsibility
        onDisconnect(pRef).remove();

        // A second player has joined — cancel the host's lobby-root onDisconnect
        // so the lobby survives if only the host closes their tab
        try { await onDisconnect(lRef()).cancel(); } catch (_) {}

        setBusy(false);
        enterLobby();
    } catch (err) {
        console.error('handleJoin error:', err);
        document.getElementById('menu-error').textContent = 'Failed to join lobby. Check your connection.';
        setBusy(false);
    }
};

/* ══════════════════════════════════════════
   LOBBY
══════════════════════════════════════════ */
function enterLobby() {
    gameState  = 'LOBBY';
    isReady    = false;
    startGuard = false;

    document.getElementById('game-wrap').style.display = 'none';
    document.getElementById('results-screen').classList.remove('visible');
    document.getElementById('countdown-overlay').classList.remove('visible');
    document.getElementById('lobby-code-display').textContent = lobbyLetter.toUpperCase();
    document.getElementById('lobby-status-msg').textContent   = '';
    updateReadyBtn();
    showScreen('screen-lobby');

    clearFbListeners();
    subPlayers();
    subMeta();
    subSelf();
}

/* Watch lobby/players — handles: list rendering, all-ready check, empty-lobby sweep */
function subPlayers() {
    addFbListener(lRef('players'), snap => {
        lobbyPlayers = snap.val() || {};
        renderList();
        if (gameState !== 'LOBBY') return;

        // If the players node is now empty while we're still listening,
        // it means the last person just closed their tab — clean up the shell
        if (Object.keys(lobbyPlayers).length === 0) {
            remove(lRef()).catch(() => {});
            return;
        }
        maybeCheckAllReady();
    });
}

/* Watch lobby root — handles: host transfer, late-joiner detection, back-to-lobby after match */
function subMeta() {
    addFbListener(lRef(), snap => {
        if (!snap.exists()) {
            if (gameState === 'LOBBY') returnToMenu();
            return;
        }
        const prev = lobbyMeta;
        lobbyMeta  = snap.val();

        renderList();

        // Host transfer: someone else updated creatorId to point at me
        if (lobbyMeta.creatorId === myId && !isHost) {
            isHost = true;
            registerDisconnectHandlers();
            toast('You are now the lobby host 👑');
            renderList();
        }

        // Late joiner arrives while match runs
        if (lobbyMeta.status === 'playing' && gameState === 'LOBBY') {
            document.getElementById('lobby-status-msg').textContent = '⚡ Match in progress – wait here.';
            if (isReady) {
                isReady = false;
                update(lRef(`players/${myId}`), { ready: false }).catch(() => {});
                updateReadyBtn();
            }
        }

        // Host wrote gameEndAt — non-hosts waiting in startMatchSequence pick it up
        // (handled inside the pollForTs interval in startMatchSequence)

        // Match ended → return to lobby
        if (lobbyMeta.status === 'lobby' && gameState === 'RESULTS') {
            finaliseBackToLobby();
        }
    });
}

/* Watch my own player node — detect kick or surprise removal */
function subSelf() {
    const r  = lRef(`players/${myId}`);
    const fn = snap => {
        if (!snap.exists()) {
            if (gameState === 'LOBBY' || gameState === 'COUNTDOWN') {
                clearFbListeners();
                returnToMenu();
            }
            return;
        }
        if (snap.val().kicked) {
            toast('You were kicked from the lobby.');
            clearFbListeners();
            remove(r).catch(() => {});
            returnToMenu();
        }
    };
    onValue(r, fn);
    fbListeners.push({ r, fn });
}

function renderList() {
    const meta      = lobbyMeta    || {};
    const players   = lobbyPlayers || {};
    const creatorId = meta.creatorId || '';
    const status    = meta.status   || 'lobby';
    const ul        = document.getElementById('player-list');
    ul.innerHTML    = '';

    Object.entries(players).forEach(([pid, p]) => {
        const color = p.color || '#aaa';
        const li    = document.createElement('li');

        const dot = document.createElement('span');
        dot.className = 'player-dot';
        dot.style.background = color;
        li.appendChild(dot);

        const nameEl = document.createElement('span');
        nameEl.className  = 'player-name-label';
        nameEl.textContent = p.name
            + (pid === creatorId ? ' 👑' : '')
            + (pid === myId      ? ' (You)' : '');
        li.appendChild(nameEl);

        const badge = document.createElement('span');
        badge.className = 'status-badge';
        if (status === 'playing') {
            badge.textContent = 'Playing';
            badge.classList.add('status-playing');
        } else {
            badge.textContent = p.ready ? 'Ready' : 'Not Ready';
            badge.classList.add(p.ready ? 'status-ready' : 'status-unready');
        }
        li.appendChild(badge);

        // Kick button — host only, not for self, not while playing
        if (isHost && pid !== myId && status !== 'playing') {
            const kb = document.createElement('button');
            kb.className  = 'btn btn-red btn-sm';
            kb.textContent = 'Kick';
            kb.onclick = () => kickPlayer(pid);
            li.appendChild(kb);
        }

        ul.appendChild(li);
    });
}

function maybeCheckAllReady() {
    if (gameState !== 'LOBBY') return;
    if ((lobbyMeta || {}).status === 'playing') return;

    const entries    = Object.entries(lobbyPlayers || {});
    const readyCount = entries.filter(([, p]) => p.ready).length;

    if (entries.length === 0) {
        document.getElementById('lobby-status-msg').textContent = '';
        return;
    }

    if (entries.every(([, p]) => p.ready)) {
        document.getElementById('lobby-status-msg').textContent = '✅ All ready! Starting…';
        startMatchSequence();
    } else {
        document.getElementById('lobby-status-msg').textContent =
            entries.length === 1
                ? 'Press Ready to play solo!'
                : `${readyCount} / ${entries.length} ready`;
    }
}

async function startMatchSequence() {
    if (gameState !== 'LOBBY' || startGuard) return;
    startGuard = true;
    gameState  = 'COUNTDOWN';

    // Batch-reset all players to not-ready
    const batch = {};
    Object.keys(lobbyPlayers).forEach(pid => {
        batch[`${lPath('players')}/${pid}/ready`] = false;
    });
    await update(ref(db), batch).catch(() => {});

    // Mark lobby as playing
    await update(lRef(), {
        status: 'playing', results: null, paintChunk: '', paintSeq: 0, gameEndAt: null
    }).catch(() => {});

    // ONLY the host writes the authoritative end timestamp.
    // If the original host left, isHost will already be true for the new host
    // because subMeta() sets it when creatorId changes.
    if (isHost) {
        const endAt = Date.now() + 3000 + GAME_DURATION;
        await update(lRef(), { gameEndAt: endAt }).catch(() => {});
        gameEndAt = endAt;
        runCountdown();
    } else {
        // Poll lobbyMeta until gameEndAt appears (host writes it above)
        const poll = setInterval(() => {
            const ts = lobbyMeta && lobbyMeta.gameEndAt;
            if (ts) {
                gameEndAt = ts;
                clearInterval(poll);
                runCountdown();
            }
        }, 80);
    }
}

function runCountdown() {
    const overlay = document.getElementById('countdown-overlay');
    const numEl   = document.getElementById('countdown-num');
    overlay.classList.add('visible');
    showScreen(null);

    let count = 3;
    numEl.textContent = count;

    const tick = () => {
        count--;
        if (count <= 0) {
            numEl.textContent = 'GO!';
            setTimeout(() => { overlay.classList.remove('visible'); launchGame(); }, 700);
            return;
        }
        numEl.textContent = count;
        numEl.style.animation = 'none';
        void numEl.offsetHeight;
        numEl.style.animation = 'pulse .8s ease-in-out';
        setTimeout(tick, 1000);
    };
    setTimeout(tick, 1000);
}

/* ══════════════════════════════════════════
   GAME
══════════════════════════════════════════ */
function launchGame() {
    gameState = 'PLAYING';
    document.getElementById('game-wrap').style.display = 'flex';

    // Build activePlayers from the lobby snapshot taken at match start
    activePlayers = Object.entries(lobbyPlayers).map(([pid, p]) => {
        const sp = SPAWN[(p.slot - 1) % SPAWN.length];
        return {
            id: pid, name: p.name, color: p.color, slot: p.slot,
            x: sp[0], y: sp[1], prevX: sp[0], prevY: sp[1],
            isMe: pid === myId
        };
    });

    grid.fill(0);
    paintSeq       = 0;
    lastAppliedSeq = -1;
    keys           = {};

    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup',   onKeyUp);

    /*
     * PAINT ARCHITECTURE (fixes gaps + inconsistent %):
     *
     * • Every client writes its OWN position to Firebase every rAF frame
     *   (throttled to ~30 writes/s via a timestamp gate).
     * • The HOST reads all positions from Firebase, interpolates the full
     *   path between prevX/prevY → x/y for EVERY player, encodes the cells,
     *   and broadcasts a paint chunk ~20 times/second.
     * • Every client (including the host itself) applies those chunks to its grid.
     * • Because the host walks the full path between consecutive position reports,
     *   there are no gaps even at high speed.
     * • Because every client applies the exact same sequence of integer cell
     *   indices, the grid is bit-for-bit identical on all devices.
     */

    // Listen for authoritative paint chunks
    addFbListener(lRef('paintChunk'), snap => {
        if (!snap.exists()) return;
        const raw = snap.val();
        if (!raw) return;
        const pipe = raw.indexOf('|');
        if (pipe < 0) return;
        const seq = parseInt(raw.slice(0, pipe), 10);
        if (seq <= lastAppliedSeq) return;
        lastAppliedSeq = seq;
        applyChunk(raw.slice(pipe + 1));
    });

    // Listen for all players' positions (including host's own — fix for invisible creator)
    addFbListener(lRef('positions'), snap => {
        if (!snap.exists()) return;
        const pos = snap.val();
        activePlayers.forEach(p => {
            if (p.isMe) return;   // my own position is managed locally
            const entry = pos[p.id];
            if (entry) {
                p.x = entry.x;
                p.y = entry.y;
            }
        });
    });

    // Watch player list — remove anyone who leaves mid-match
    addFbListener(lRef('players'), snap => {
        const fresh = snap.val() || {};
        activePlayers = activePlayers.filter(p => !!fresh[p.id]);
    });

    startTimerLoop();
    if (isHost) startHostPaintLoop();
    rafId = requestAnimationFrame(gameLoop);
}

function onKeyDown(e) {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
}
function onKeyUp(e) { keys[e.code] = false; }

/* ── HOST: collects positions from Firebase, paints, broadcasts chunk ── */
function startHostPaintLoop() {
    paintTimer = setInterval(async () => {
        if (gameState !== 'PLAYING') { clearInterval(paintTimer); return; }

        const parts = [];
        activePlayers.forEach(p => {
            // prevX/prevY are updated HERE by the host for non-self players,
            // because the host tracks the last-reported position.
            // For self (host's own player), prevX/prevY are updated in gameUpdate().
            const indices = cellLine(p.prevX, p.prevY, p.x, p.y);
            if (indices.length > 0) {
                parts.push(`${p.slot}:${indices.join(',')}`);
            }
            p.prevX = p.x;
            p.prevY = p.y;
        });

        if (parts.length === 0) return;
        const chunk = `${paintSeq}|${parts.join(';')}`;
        paintSeq++;
        await update(lRef(), { paintChunk: chunk }).catch(() => {});
    }, 50); // 20 fps
}

/* ── POSITION THROTTLE: limit Firebase writes to ~30/s ── */
let lastPosSend = 0;

function gameUpdate() {
    const me = activePlayers.find(p => p.isMe);
    if (!me) return;

    let mx = 0, my = 0;
    if (keys['ArrowUp']    || keys['KeyW']) my = -1;
    if (keys['ArrowDown']  || keys['KeyS']) my =  1;
    if (keys['ArrowLeft']  || keys['KeyA']) mx = -1;
    if (keys['ArrowRight'] || keys['KeyD']) mx =  1;
    if (mx !== 0 && my !== 0) { mx *= 0.7071; my *= 0.7071; }

    me.prevX = me.x;
    me.prevY = me.y;
    me.x = Math.max(PLAYER_R, Math.min(canvas.width  - PLAYER_R, me.x + mx * SPEED));
    me.y = Math.max(PLAYER_R, Math.min(canvas.height - PLAYER_R, me.y + my * SPEED));

    // Instant local paint preview — keeps our own view snappy without waiting for chunk
    const idx = cellLine(me.prevX, me.prevY, me.x, me.y);
    for (let i = 0; i < idx.length; i++) grid[idx[i]] = me.slot;

    // Publish our position for all other clients (and the host's paint loop)
    // Every player writes — this fixes the creator's roller not moving on others' screens
    const now = performance.now();
    if (now - lastPosSend >= 33) {   // ~30 fps write throttle
        lastPosSend = now;
        update(lRef('positions'), { [myId]: { x: me.x, y: me.y } }).catch(() => {});
    }
}

function gameDraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Build slot → color map
    const colorMap = {};
    activePlayers.forEach(p => { colorMap[p.slot] = p.color; });

    // Draw grid
    for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
            const slot = grid[c * ROWS + r];
            if (slot > 0 && colorMap[slot]) {
                ctx.fillStyle = colorMap[slot];
                ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
            }
        }
    }

    // Scoreboard
    const stats = calcRatios();
    document.getElementById('scores-bar').innerHTML =
        stats.map(s =>
            `<span class="score-chip" style="background:${s.color}">${s.name}: ${s.pct}%</span>`
        ).join('');

    // Draw players
    activePlayers.forEach(p => {
        // Roller ring
        ctx.strokeStyle = p.color;
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, ROLLER_R, 0, Math.PI * 2);
        ctx.stroke();

        // Body
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(p.x, p.y, PLAYER_R, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, PLAYER_R - 4, 0, Math.PI * 2);
        ctx.fill();

        // Name label — dark pill, player-coloured text
        const labelY = p.y - ROLLER_R - 8;
        ctx.font         = 'bold 12px Segoe UI, Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'bottom';
        const tw = ctx.measureText(p.name).width;
        const pH = 4, pV = 2;
        ctx.fillStyle = 'rgba(0,0,0,0.80)';
        ctx.beginPath();
        ctx.roundRect(p.x - tw / 2 - pH, labelY - 12 - pV, tw + pH * 2, 12 + pV * 2 + 1, 4);
        ctx.fill();
        ctx.fillStyle    = p.color;
        ctx.fillText(p.name, p.x, labelY);
        ctx.textBaseline = 'alphabetic';
    });
}

function gameLoop() {
    if (gameState !== 'PLAYING') return;
    gameUpdate();
    gameDraw();
    rafId = requestAnimationFrame(gameLoop);
}

function calcRatios() {
    const counts = {};
    activePlayers.forEach(p => { counts[p.slot] = 0; });
    for (let i = 0; i < grid.length; i++) {
        const s = grid[i];
        if (s > 0 && Object.prototype.hasOwnProperty.call(counts, s)) counts[s]++;
    }
    return activePlayers.map(p => ({
        name: p.name, color: p.color, slot: p.slot,
        pct: ((counts[p.slot] / TOTAL_CELLS) * 100).toFixed(1)
    }));
}

function startTimerLoop() {
    timerTick = setInterval(() => {
        const rem = Math.max(0, Math.ceil((gameEndAt - Date.now()) / 1000));
        document.getElementById('timer-display').textContent = rem + 's';
        if (rem <= 0) { clearInterval(timerTick); endGame(); }
    }, 250);
}

/* ══════════════════════════════════════════
   END GAME → RESULTS → BACK TO LOBBY
══════════════════════════════════════════ */
function endGame() {
    if (gameState !== 'PLAYING') return;
    gameState = 'RESULTS';

    cancelAnimationFrame(rafId);
    clearInterval(timerTick);
    clearInterval(paintTimer);
    window.removeEventListener('keydown', onKeyDown);
    window.removeEventListener('keyup',   onKeyUp);

    // Clean up my position entry
    update(lRef('positions'), { [myId]: null }).catch(() => {});

    const stats = calcRatios().sort((a, b) => b.pct - a.pct);

    // Reset all players' ready state
    const batch = {};
    Object.keys(lobbyPlayers).forEach(pid => {
        batch[`${lPath('players')}/${pid}/ready`] = false;
    });
    update(ref(db), batch).catch(() => {});
    update(lRef(), { results: JSON.stringify(stats) }).catch(() => {});

    showResults(stats);

    resultTimer = setTimeout(async () => {
        await update(lRef(), {
            status: 'lobby', gameEndAt: null, paintChunk: '', paintSeq: 0
        }).catch(() => {});
        finaliseBackToLobby();
    }, RESULT_DURATION);
}

function showResults(stats) {
    document.getElementById('game-wrap').style.display = 'none';
    const medals = ['🥇', '🥈', '🥉'];
    document.getElementById('results-list').innerHTML = stats.map((s, i) =>
        `<div class="result-row">
            <span class="result-rank">${medals[i] || (i + 1) + '.'}</span>
            <span class="result-dot" style="background:${s.color}"></span>
            <span class="result-name">${s.name}</span>
            <span class="result-pct" style="color:${s.color}">${s.pct}%</span>
        </div>`
    ).join('');

    const top      = stats[0];
    const tie      = stats.length > 1 && parseFloat(stats[0].pct) === parseFloat(stats[1].pct);
    const titleEl  = document.getElementById('results-title');
    titleEl.textContent = tie ? "🤝 It's a Tie!" : `🏆 ${top.name} Wins!`;
    titleEl.style.color = tie ? '#fff' : top.color;
    document.getElementById('results-screen').classList.add('visible');

    let secs   = Math.ceil(RESULT_DURATION / 1000);
    const cdEl = document.getElementById('results-countdown');
    cdEl.textContent = `Returning to lobby in ${secs}s…`;
    const cdTick = setInterval(() => {
        secs--;
        if (secs <= 0) { clearInterval(cdTick); return; }
        cdEl.textContent = `Returning to lobby in ${secs}s…`;
    }, 1000);
}

function finaliseBackToLobby() {
    if (gameState === 'LOBBY') return;
    gameState = 'LOBBY';

    cancelAnimationFrame(rafId);
    clearInterval(timerTick);
    clearInterval(paintTimer);
    clearTimeout(resultTimer);

    document.getElementById('results-screen').classList.remove('visible');
    document.getElementById('game-wrap').style.display   = 'none';
    document.getElementById('countdown-overlay').classList.remove('visible');

    isReady    = false;
    startGuard = false;
    updateReadyBtn();
    document.getElementById('lobby-status-msg').textContent = '';
    showScreen('screen-lobby');

    // Re-register disconnect handlers (we're back in lobby)
    registerDisconnectHandlers();

    // Ensure my player node exists and is unready
    get(lRef(`players/${myId}`)).then(snap => {
        if (snap.exists()) {
            update(lRef(`players/${myId}`), { ready: false }).catch(() => {});
        } else {
            set(lRef(`players/${myId}`), {
                name: myName, color: PLAYER_COLORS[0], slot: 1, ready: false
            }).catch(() => {});
        }
    }).catch(() => {});

    clearFbListeners();
    subPlayers();
    subMeta();
    subSelf();
}

/* ══════════════════════════════════════════
   READY / UNREADY
══════════════════════════════════════════ */
window.toggleReady = async () => {
    if (gameState !== 'LOBBY') return;
    if ((lobbyMeta || {}).status === 'playing') return;
    isReady = !isReady;
    await update(lRef(`players/${myId}`), { ready: isReady }).catch(() => {});
    updateReadyBtn();
};

function updateReadyBtn() {
    const btn = document.getElementById('btn-ready');
    if (!btn) return;
    btn.textContent = isReady ? '❌ Unready' : '✅ Ready';
    btn.className   = isReady ? 'btn btn-grey' : 'btn btn-green';
}

/* ══════════════════════════════════════════
   KICK
══════════════════════════════════════════ */
async function kickPlayer(pid) {
    if (!isHost) return;
    await update(lRef(`players/${pid}`), { kicked: true }).catch(() => {});
    setTimeout(() => remove(lRef(`players/${pid}`)).catch(() => {}), 600);
    update(lRef('positions'), { [pid]: null }).catch(() => {});
    toast('Player kicked!');
}

/* ══════════════════════════════════════════
   LEAVE  (explicit button — full clean exit)
══════════════════════════════════════════ */
window.leaveLobby = async () => {
    // 1. Cancel onDisconnect handlers BEFORE any explicit removes
    await cancelDisconnectHandlers();

    // 2. Stop local timers / loops
    clearFbListeners();
    cancelAnimationFrame(rafId);
    clearInterval(timerTick);
    clearInterval(paintTimer);
    clearTimeout(resultTimer);

    // 3. Remove my player node and position entry
    await remove(lRef(`players/${myId}`)).catch(() => {});
    await update(lRef('positions'), { [myId]: null }).catch(() => {});

    // 4. Handle remaining players
    const psSnap    = await get(lRef('players')).catch(() => null);
    const remaining = psSnap && psSnap.exists()
        ? Object.entries(psSnap.val()).filter(([pid]) => pid !== myId)
        : [];

    if (remaining.length === 0) {
        // I was the last player — delete the lobby entirely
        await remove(lRef()).catch(() => {});
    } else if (isHost) {
        // Transfer host to the player who has been there longest (first in list)
        const [newHostId] = remaining[0];
        await update(lRef(), { creatorId: newHostId }).catch(() => {});
        // New host's subMeta will detect creatorId change and register their disconnect handler
    }

    // 5. Sweep all OTHER empty lobbies too
    await sweepEmptyLobbies();

    returnToMenu();
};

/* ══════════════════════════════════════════
   RETURN TO MENU  (local-only reset)
══════════════════════════════════════════ */
function returnToMenu() {
    gameState     = 'MENU';
    isReady       = false;
    isHost        = false;
    myId          = null;
    lobbyLetter   = '';
    lobbyMeta     = {};
    lobbyPlayers  = {};
    activePlayers = [];

    cancelAnimationFrame(rafId);
    clearInterval(timerTick);
    clearInterval(paintTimer);
    clearTimeout(resultTimer);

    document.getElementById('game-wrap').style.display   = 'none';
    document.getElementById('results-screen').classList.remove('visible');
    document.getElementById('countdown-overlay').classList.remove('visible');
    document.getElementById('join-section').style.display = 'none';
    document.getElementById('menu-error').textContent    = '';
    document.getElementById('input-code').value          = '';

    showScreen('screen-menu');
}

/* ══════════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════════ */
document.getElementById('input-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleJoin();
});
document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleCreate();
});

</script>
